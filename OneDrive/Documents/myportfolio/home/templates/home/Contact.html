<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Contact - Sumit Rathore Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
   @import url("https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap");

   body {
     font-family: "Josefin Sans", sans-serif;
     background-color: #2f2f2f;
     color: white;
     margin: 0;
     min-height: 100vh;
     display: flex;
     flex-direction: column;
     align-items: center;
     padding: 2rem 1rem;
   }
   nav {
     width: 100%;
     max-width: 1200px;
     padding: 1rem 2rem;
     display: flex;
     justify-content: center;
     gap: 3rem;
     background: transparent;
     font-size: 14px;
     font-weight: 300;
     letter-spacing: 0.05em;
     margin-bottom: 2rem;
   }
   nav a {
     color: white;
     text-decoration: none;
     transition: color 0.3s ease;
     cursor: pointer;
   }
   nav a:hover,
   nav a.active {
     text-decoration: underline;
     color: #ddd;
   }
   main {
     width: 100%;
     max-width: 600px;
     background: rgba(255 255 255 / 0.05);
     padding: 2rem;
     border-radius: 12px;
     box-shadow: 0 0 20px rgba(255 255 255 / 0.1);
   }
   h1 {
     font-size: 2.5rem;
     font-weight: 700;
     margin-bottom: 1.5rem;
     text-align: center;
   }
   form {
     display: flex;
     flex-direction: column;
     gap: 1.25rem;
   }
   label {
     font-weight: 500;
     margin-bottom: 0.25rem;
     display: block;
   }
   input,
   textarea {
     background: #1f1f1f;
     border: 1px solid #444;
     border-radius: 6px;
     padding: 0.75rem 1rem;
     color: white;
     font-size: 1rem;
     resize: vertical;
     transition: border-color 0.3s ease;
     width: 100%;
   }
   input:focus,
   textarea:focus {
     outline: none;
     border-color: #3b82f6;
     box-shadow: 0 0 8px #3b82f6;
     background: #292929;
   }
   button {
     background-color: #3b82f6;
     color: white;
     font-weight: 600;
     padding: 0.75rem 1rem;
     border: none;
     border-radius: 6px;
     cursor: pointer;
     font-size: 1.1rem;
     transition: background-color 0.3s ease;
   }
   button:hover {
     background-color: #2563eb;
   }
   @media (max-width: 640px) {
     main {
       padding: 1.5rem 1rem;
     }
     h1 {
       font-size: 2rem;
     }
   }
  </style>
 </head>
 <body>
  <!-- Navigation -->
  <nav>
  <a href="{% url 'index' %}">HOME</a>
  <a href="{% url 'projects' %}">WORK</a>
  <a href="{% url 'about' %}">ABOUT</a>
  <a href="{% url 'contact' %}" class="active">CONTACT</a>
  <a href="{% url 'blogs' %}">BLOGS</a>
  </nav>
  <!-- Contact Form -->
  <main>
   <h1>Contact Me</h1>
   <form action="#" method="POST" aria-label="Contact form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name" />
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="your.email@example.com" required autocomplete="email" />
    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject" placeholder="Subject of your message" required />
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
    <button type="submit" aria-label="Send message">Send Message</button>
   </form>
  </main>
 </body>
</html>
  </style>
</head>
<body>
  <!-- ...existing content... -->
</body>
</html>
</html>
